services:
  ows:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-localhost}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-datacube}
      - POSTGRES_USER=${POSTGRES_USER:-datacube}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-datacube}
      - ODC_DEFAULT_DB_HOSTNAME=${ODC_DEFAULT_DB_HOSTNAME:-localhost}
      - ODC_DEFAULT_DB_PORT=${ODC_DEFAULT_DB_PORT:-5432}
      - ODC_DEFAULT_DB_DATABASE=${ODC_DEFAULT_DB_DATABASE:-datacube}
      - ODC_DEFAULT_DB_USERNAME=${ODC_DEFAULT_DB_USERNAME:-datacube}
      - ODC_DEFAULT_DB_PASSWORD=${ODC_DEFAULT_DB_PASSWORD:-datacube}
    develop:
      watch:
        - action: sync
          path: ./ows_config
          target: /env/config/ows_config
          ignore:
            - .venv/
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./pyproject.toml
